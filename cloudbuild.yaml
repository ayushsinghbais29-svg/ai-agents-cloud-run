steps:
  # Step 1: Run unit tests
  - name: "python:3.11-slim"
    id: "run-tests"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet -r requirements.txt
        python -m pytest tests/ -v --tb=short

  # Step 2: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:latest"
      - "."
    waitFor:
      - "run-tests"

  # Step 3: Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}"
    waitFor:
      - "build-image"

  # Step 4: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--set-env-vars"
      - "MODEL_NAME=${_MODEL_NAME},LOG_LEVEL=INFO"
      - "--update-secrets"
      - "GOOGLE_API_KEY=${_SECRET_NAME}:latest"
    waitFor:
      - "push-image"

substitutions:
  _SERVICE_NAME: ai-text-agent
  _REGION: us-central1
  _MODEL_NAME: gemini-2.0-flash
  _SECRET_NAME: GOOGLE_API_KEY

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM
